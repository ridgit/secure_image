name: Build Check and Push Docker Image

on:
  push:
    branches:
      - main  # Déclenche le pipeline sur les commits dans la branche main
  workflow_dispatch:  # Permet de déclencher manuellement le workflow

jobs:
  # Job pour Bandit - analyse statique de sécurité pour Python
  bandit-scan:
    name: Scan Python code for vulnerabilities with Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bandit
        run: |
          pip install bandit

      - name: Run Bandit to detect vulnerabilities
        run: |
          bandit -r . -f txt -o bandit-report.txt
          
      - name: Display Bandit report
        run: |
          cat bandit-report.txt
          
      - name: Fail if Bandit finds issues
        run: |
          if grep -q "Issue:" bandit-report.txt; then
            echo "Security issues detected by Bandit!"
            exit 1
          else
            echo "No security issues found by Bandit."
          fi

  # Job pour Gitleaks - vérification des secrets exposés dans le dépôt
  gitleaks-scan:
    name: Scan repository for secrets with Gitleaks
    runs-on: ubuntu-latest
    needs: bandit-scan  # Dépend de la réussite du job bandit-scan
    if: ${{ needs.bandit-scan.result == 'success' }}  # S'exécute seulement si bandit-scan a réussi
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gitleaks to detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--redact"

  # Job de build et scan Docker, qui s'exécute seulement si les jobs de scan réussissent
  build-and-scan:
    needs: gitleaks-scan  # Dépend de la réussite des jobs bandit-scan et gitleaks-scan
    runs-on: ubuntu-latest
    if: ${{ needs.gitleaks-scan.result == 'success' }}  # S'exécute seulement si gitleaks-scan a réussi
    steps:
      # Checkout du dépôt
      - name: Checkout code
        uses: actions/checkout@v4

      # Configuration de Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Connexion à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Construire l'image Docker
      - name: Build Docker image
        working-directory: ./function_image1
        run: |
          docker build -t ${{ secrets.MY_CONTAINER }}/day-function:latest .

      # Analyser l'image avec Trivy
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.MY_CONTAINER }}/day-function:latest
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: 1

      # Pousser l'image Docker sur Docker Hub
      - name: Push Docker image
        if: success()
        run: |
          docker push ${{ secrets.MY_CONTAINER }}/day-function:latest
