name: Build Check and Push Docker Image

on:
  push:
    branches:
      - main  # Déclenche le pipeline sur les commits dans la branche main
  workflow_dispatch:  # Permet de déclencher manuellement le workflow
    inputs:
      file_to_analyze:
        description: 'Path of the Python file to analyze'
        required: true
        default: 'function_image1/day.py'

jobs:
  # Job pour analyser les identifiants sécurisés dans le code
  analyze-code:
    name: Analyze Python code for secure credential usage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Vérification du dépôt

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'
      
      - name: Install required packages
        run: |
          python -m pip install --upgrade pip
          pip install ast

      - name: Run security analysis script
        run: |
          # Créer le script directement dans le workflow
          echo "
          import ast
          import os

          EXTERNAL_SERVICES = {
              'Minio': 'minio',
              'MongoClient': 'pymongo',
              'connect': 'nats',
              'boto3': 'boto3'
          }

          SECRET_SOURCES = ['os.getenv', 'hvac.Client']

          class ServiceConnectionAnalyzer(ast.NodeVisitor):
              def __init__(self):
                  self.service_security_report = {}

              def visit_Import(self, node):
                  for alias in node.names:
                      if alias.name in EXTERNAL_SERVICES.values():
                          self.service_security_report[alias.name] = True
                  self.generic_visit(node)

              def visit_ImportFrom(self, node):
                  if node.module in EXTERNAL_SERVICES.values():
                      for alias in node.names:
                          self.service_security_report[alias.name] = True
                  self.generic_visit(node)

              def visit_Call(self, node):
                  if isinstance(node.func, ast.Name):
                      service_name = node.func.id
                      if service_name in EXTERNAL_SERVICES:
                          self.check_service_security(service_name, node.args)
                  elif isinstance(node.func, ast.Attribute):
                      service_name = node.func.attr
                      if service_name in EXTERNAL_SERVICES:
                          self.check_service_security(service_name, node.args)
                  self.generic_visit(node)

              def check_service_security(self, service_name, args):
                  for arg in args:
                      if not self.check_secure_source(arg):
                          self.service_security_report[service_name] = False

              def check_secure_source(self, node):
                  if isinstance(node, ast.Call):
                      func_name = self.get_full_func_name(node.func)
                      if func_name in SECRET_SOURCES:
                          return True
                  elif isinstance(node, ast.Str):
                      return False
                  return True

              def get_full_func_name(self, node):
                  if isinstance(node, ast.Name):
                      return node.id
                  elif isinstance(node, ast.Attribute):
                      return f'{self.get_full_func_name(node.value)}.{node.attr}'
                  return ''

              def analyze(self, code):
                  tree = ast.parse(code)
                  self.visit(tree)
                  return self.service_security_report

          def main(file_to_analyze):
              with open(file_to_analyze, 'r') as f:
                  code = f.read()
                  analyzer = ServiceConnectionAnalyzer()
                  service_security_report = analyzer.analyze(code)
                  for service, is_secure in service_security_report.items():
                      if not is_secure:
                          print(f'Les identifiants pour le service {service} ne sont pas sécurisés.')
                          exit(1)  # Quitte avec une erreur si un identifiant non sécurisé est trouvé
                  print('Tous les services sont sécurisés pour le fichier:', file_to_analyze)

          if __name__ == '__main__':
              main('${{ github.event.inputs.file_to_analyze }}')
          " > analyze_code.py
          
          python analyze_code.py

  # Job pour Gitleaks - vérification des secrets exposés dans le dépôt
  gitleaks-scan:
    name: Scan repository for secrets with Gitleaks
    runs-on: ubuntu-latest
    needs: analyze-code  # Dépend de la réussite du job analyze-code
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Vérification du dépôt

      - name: Run Gitleaks to detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Utilisation du token GitHub
        with:
          args: "--redact"  # Redacte les secrets détectés dans le log de sortie pour la sécurité

  # Job de build et scan Docker, qui s'exécute seulement si les jobs de scan réussissent
  build-and-scan:
    needs: gitleaks-scan  # Dépend de la réussite des jobs analyze-code et gitleaks-scan
    runs-on: ubuntu-latest
    if: ${{ needs.gitleaks-scan.result == 'success' }}  # S'exécute seulement si les deux scans ont réussi
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        working-directory: ./function_image1
        run: |
          docker build -t ${{ secrets.MY_CONTAINER }}/day-function:latest .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.MY_CONTAINER }}/day-function:latest
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Push Docker image
        if: success()  # Exécuter seulement si le scan Trivy réussit
        run: |
          docker push ${{ secrets.MY_CONTAINER }}/day-function:latest
