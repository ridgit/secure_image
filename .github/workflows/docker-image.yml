name: Build Check and Push Docker Image

on:
  push:
    branches:
      - main  # Déclenche le pipeline sur les commits dans la branche main
    paths:
      - "function_image1/**"
  workflow_dispatch:  # Permet de déclencher manuellement le workflow depuis GitHub Actions

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout du dépôt
      - name: Checkout code
        uses: actions/checkout@v4

      # Configuration de Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Connexion à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Construire l'image Docker
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/date-time-function:latest .

      # Analyser l'image avec Trivy
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/date-time-function:latest

      # Pousser l'image Docker sur Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/date-time-function:latest
